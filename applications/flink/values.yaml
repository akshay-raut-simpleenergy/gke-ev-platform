# ==========================================
# Apache Flink Configuration
# ==========================================

jobmanager:
  replicaCount: 1

  resources:
    requests:
      cpu: 500m
      memory: 1024Mi

    limits:
      cpu: 1000m
      memory: 2Gi

taskmanager:
  replicaCount: 2

  resources:
    requests:
      cpu: 500m
      memory: 1024Mi

    limits:
      cpu: 1000m
      memory: 2Gi

service:
  type: ClusterIP

ingress:
  enabled: false
